<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Internet Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="browser-ui">
    
    <div id="title-bar">
    </div>

    <div id="nav-toolbar">
      
      <div id="nav-buttons">
        <button id="back-btn" class="nav-btn" disabled title="Back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <button id="forward-btn" class="nav-btn" disabled title="Forward">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>

      <div id="urlbar-container">
        <div id="urlbar-wrapper">
          <img id="url-icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpath d='M3 1v14h10V5.5L8.5 1H3zm1 1h3.5v4H12v8H4V2z' fill='%23555'/%3E%3C/svg%3E" width="16" height="16" alt="IE">
          <input id="urlbar-input" type="text" placeholder="Search or enter web address" autocomplete="off" />
          <div id="url-spinner"></div>
          <button id="reload-btn" class="urlbar-icon" title="Refresh">
            <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
          </button>
        </div>
      </div>
      
      <div id="action-buttons">
        <button id="home-btn" class="action-btn" title="Home">
           <svg viewBox="0 0 24 24" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </button>
        <button id="star-btn" class="action-btn" title="View favorites, feeds, and history">
           <svg viewBox="0 0 24 24" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
        </button>
        <button id="menu-btn" class="action-btn" title="Tools">
          <svg viewBox="0 0 24 24" fill="#FFFFFF" stroke="#000000" stroke-width="1.2"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65A.488.488 0 0 0 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49-.12-.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
        </button>
      </div>
    </div>

    <div id="favorites-bar"></div>

    <div id="tabs-strip">
      <div id="tabs-container"></div>
    </div>

    <div id="menu-popup">
      <div class="menu-item" id="menu-new-tab">New tab</div>
      <div class="menu-item" style="opacity:0.5">Duplicate tab</div>
      <div class="menu-item" style="opacity:0.5">New window</div>
      <div class="menu-sep"></div>
      <div class="menu-item" id="toggle-favorites-btn">Favorites bar</div>
      <div class="menu-item">Internet options</div>
      <div class="menu-sep"></div>
      <div class="menu-item" id="menu-theme-toggle">
        <span id="theme-label">Switch to Dark Mode</span>
      </div>
    </div>
  </div>

  <div id="web-content"></div>
  <div id="status-bar">Ready</div>

  <script src="script.js"></script>
</body>
</html>
